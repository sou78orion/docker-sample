services:

  tomcat-server:
    build: .
    restart: unless-stopped
    ports:
      - 7001:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/sample/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  reverse-proxy:
    image: nginx
    restart: unless-stopped
    depends_on:
      tomcat-server:
        condition: service_healthy
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - 8081:80
